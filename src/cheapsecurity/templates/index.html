<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CheapSecurity CCTV</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <h1>🎥 CheapSecurity CCTV</h1>
    <span id="status-badge" class="badge">Initializing…</span>
  </header>

  <main>
    <section class="card stream">
      <h2>Live stream</h2>
      <img id="live" src="{{ url_for('video_feed') }}" alt="Live camera feed">
    </section>

    <section class="card">
      <h2>Status</h2>
      <dl id="status-list">
        <dt>Resolution</dt><dd id="status-res">—</dd>
        <dt>FPS</dt><dd id="status-fps">—</dd>
        <dt>Recording</dt><dd id="status-rec">—</dd>
        <dt>Motion</dt><dd id="status-motion">—</dd>
        <dt>Current file</dt><dd id="status-file">—</dd>
      </dl>
    </section>

    <section class="card">
      <h2>Settings</h2>
      <label class="toggle">
        <input type="checkbox" id="night-toggle" onchange="setNightMode(this.checked)">
        <span>🌙 Night mode (low-light enhancement)</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="telegram-toggle" onchange="setTelegram(this.checked)">
        <span>Telegram video notifications</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="notif-toggle" onchange="setNotifications(this.checked)">
        <span>Email notifications on motion</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="auth-toggle" onchange="setAuth(this.checked)">
        <span>Built-in basic auth (disable if using nginx auth)</span>
      </label>
    </section>

    <section class="card">
      <h2>Recordings</h2>
      <div class="toolbar">
        <button id="refresh-btn" onclick="loadRecordings()">Refresh</button>
        <label class="toggle inline">
          <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)">
          <span>Select all</span>
        </label>
        <button id="telegram-btn" onclick="sendSelectedToTelegram()" disabled>Send to Telegram</button>
        <button id="download-btn" onclick="downloadSelected()" disabled>Download selected</button>
        <button id="delete-btn" class="danger" onclick="deleteSelected()" disabled>Delete selected</button>
      </div>
      <ul id="recordings"></ul>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
