# Example nginx configuration for CheapSecurity.
# Adjust server_name, paths, and certificate locations for your setup.

server {
    listen 80;
    server_name cctv.example.com;

    # Uncomment the next two lines after running certbot to redirect HTTP to HTTPS
    # listen 443 ssl;
    # return 301 https://$host$request_uri;

    # Optional: nginx basic auth (generate with: htpasswd -c /etc/nginx/.htpasswd admin)
    # auth_basic "CheapSecurity";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    location /static/ {
        alias /home/YOUR_USER/CheapSecurity/static/;
        expires 1d;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for the MJPEG live stream so nginx does not buffer frames
        proxy_buffering off;
        proxy_cache off;
    }
}

